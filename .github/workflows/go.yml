name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    strategy:
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
        go-version: ["1.25"]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Go dependencies
        run: go mod download
        env:
          GOPROXY: "https://proxy.golang.org"

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  templ:
    name: templ-generated-code-in-sync
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Checkout
        uses: actions/checkout@v7

      # Regenerate *_templ.go from *.templ and fail if it differs from what is
      # committed, so a forgotten `templ generate` cannot land stale code.
      # Pinned to the github.com/a-h/templ version in go.mod / Makefile.
      - name: Verify templ generated code is up to date
        run: |
          go run github.com/a-h/templ/cmd/templ@v0.3.1020 generate
          git diff --exit-code
