
repos:
  - repo: local
    hooks:
      - id: templ-generate
        name: templ generate (*_templ.go must match *.templ)
        entry: make templ-check
        language: system
        # Trigger on either side so a stale *_templ.go cannot land even when no
        # *.templ is part of the commit (matches the CI check in go.yml).
        files: '(\.templ|_templ\.go)$'
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: trailing-whitespace
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.0
    hooks:
      - id: go-fmt
      - id: golangci-lint
      - id: go-unit-tests
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v8.0.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']